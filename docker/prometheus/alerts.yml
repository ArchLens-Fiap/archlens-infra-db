groups:
  - name: archlens-alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) by (job) / sum(rate(http_server_request_duration_seconds_count[5m])) by (job) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alta taxa de erros no servico {{ $labels.job }}"
          description: "Taxa de erros 5xx acima de 5% por mais de 2 minutos (atual: {{ $value | humanizePercentage }})"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (job, le)) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Alta latencia no servico {{ $labels.job }}"
          description: "Latencia p95 acima de 10s por mais de 3 minutos (atual: {{ $value | humanizeDuration }})"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Servico {{ $labels.job }} esta fora do ar"
          description: "O servico {{ $labels.instance }} nao responde ha mais de 1 minuto"

      - alert: AIProviderHighFailureRate
        expr: sum(rate(archlens_provider_failure_total[10m])) by (provider) / (sum(rate(archlens_provider_success_total[10m])) by (provider) + sum(rate(archlens_provider_failure_total[10m])) by (provider)) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI Provider {{ $labels.provider }} com alta taxa de falha"
          description: "Provider {{ $labels.provider }} com taxa de falha acima de 30% (atual: {{ $value | humanizePercentage }})"

      - alert: RabbitMQQueueBacklog
        expr: rabbitmq_queue_messages{queue=~".*archlens.*"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backlog na fila {{ $labels.queue }}"
          description: "Fila {{ $labels.queue }} com {{ $value }} mensagens pendentes"

      - alert: HighAnalysisProcessingTime
        expr: avg(archlens_analysis_duration_ms) > 60000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tempo medio de analise acima de 60s"
          description: "Tempo medio de processamento: {{ $value }}ms"
