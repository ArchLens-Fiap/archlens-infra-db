global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "upload-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5066"]

  - job_name: "orchestrator-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5089"]

  - job_name: "report-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5205"]

  - job_name: "notification-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5150"]

  - job_name: "gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5000"]

  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5120"]

  - job_name: "ai-processing"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
