services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: archlens-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (collector)
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - jaeger
      - loki
    networks:
      - archlens-net

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: archlens-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - archlens-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: archlens-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - archlens-net

  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: archlens-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - archlens-net

  loki:
    image: grafana/loki:3.3.2
    container_name: archlens-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - archlens-net

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  archlens-net:
    external: true
    name: docker_archlens-net
